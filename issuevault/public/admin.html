<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IssueVault — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --white: #ffffff;
      --accent: #4361ee;
      --accent2: #7209b7;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e2e8f0;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      min-height: 100vh;
      color: var(--text);
    }

    .navbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(67,97,238,0.07);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .admin-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-logout {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: #fee2e2; }

    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 20px;
    }

    .page-header {
      margin-bottom: 28px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .page-header p { color: var(--muted); font-size: 15px; }

    .btn-refresh {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 20px 22px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(67,97,238,0.06);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .stat-value.total    { color: var(--accent); }
    .stat-value.pending  { color: var(--warning); }
    .stat-value.resolved { color: #2563eb; }
    .stat-value.verified { color: var(--success); }

    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--muted);
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(67,97,238,0.06);
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .complaints-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .complaint-item {
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .complaint-item:hover {
      border-color: #c7d2fe;
      box-shadow: 0 4px 16px rgba(67,97,238,0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .complaint-info { flex: 1; }

    .complaint-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .complaint-title {
      font-size: 15px;
      font-weight: 700;
    }

    .complaint-student {
      font-size: 12px;
      background: var(--bg);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .complaint-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .complaint-date {
      font-size: 12px;
      color: #b0b8cc;
    }

    .complaint-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-pending  { background: #fef3c7; color: #d97706; }
    .badge-resolved { background: #eff6ff; color: #2563eb; }
    .badge-verified { background: #f0fdf4; color: #16a34a; }

    .status-select {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .status-select:focus { border-color: var(--accent); }

    .btn-update {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      padding: 8px 16px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(67,97,238,0.3);
    }

    .btn-update:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-update:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #166534; }
    .toast.error { background: #dc2626; }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn:hover { color: #4361ee; }
    .tab-btn.active {
      color: #4361ee;
      border-bottom-color: #4361ee;
    }

    @media (max-width: 700px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .complaint-item { flex-direction: column; }
      .complaint-actions { flex-direction: row; align-items: center; }
      .navbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <div class="brand-icon">🏠</div>
      <div class="brand-name">IssueVault</div>
      <div class="admin-badge">ADMIN</div>
    </div>
    <div class="nav-right">
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="main">

    <div class="page-header">
      <div>
        <h1>Admin Dashboard🛡️</h1>
        <p>View and manage all hostel complaints.</p>
      </div>
      <button class="btn-refresh" onclick="loadComplaints()">🔄Refresh</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">📋Total</div>
        <div class="stat-value total" id="countTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⏳Pending</div>
        <div class="stat-value pending" id="countPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🔧Resolved</div>
        <div class="stat-value resolved" id="countResolved">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅Verified</div>
        <div class="stat-value verified" id="countVerified">0</div>
      </div>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:20px; border-bottom:2px solid #e2e8f0; padding-bottom:0;">
      <button class="tab-btn active" id="tab-all" onclick="switchTab('All')">All</button>
      <button class="tab-btn" id="tab-pending" onclick="switchTab('Pending')">⏳ Pending</button>
      <button class="tab-btn" id="tab-resolved" onclick="switchTab('Resolved')">🔧 Resolved</button>
      <button class="tab-btn" id="tab-verified" onclick="switchTab('Verified')">✅ Verified</button>
    </div>

    <div class="card">
      <div class="card-title">📌All Complaints</div>
      <div id="complaintsList">
        <div class="loading">Loading complaints...</div>
      </div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token || role !== 'admin') {
      window.location.href = 'login.html';
    }

    let allComplaints = [];
    let currentFilter = 'All';

    async function loadComplaints() {
      document.getElementById('complaintsList').innerHTML =
        '<div class="loading">Loading complaints...</div>';

      try {
        const response = await fetch('http://localhost:5000/api/complaints', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();

        if (!response.ok) {
          if (response.status === 401) { logout(); return; }
          throw new Error('Failed to load');
        }

        allComplaints = data;
        updateStats(data);
        switchTab(currentFilter);

      } catch (error) {
        document.getElementById('complaintsList').innerHTML =
          '<div class="empty-state"><div class="emoji">⚠️</div><p>Failed to load complaints.</p></div>';
      }
    }

      function switchTab(status) {
        currentFilter = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const tabMap = { 'All': 'tab-all', 'Pending': 'tab-pending', 'Resolved': 'tab-resolved', 'Verified': 'tab-verified' };
        document.getElementById(tabMap[status]).classList.add('active');
        const filtered = status === 'All' ? allComplaints : allComplaints.filter(c => c.status === status);
        renderComplaints(filtered);
  }
    function renderComplaints(complaints) {
      const list = document.getElementById('complaintsList');

      if (complaints.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>No complaints found.</p></div>';
        return;
      }

      list.innerHTML = '<div class="complaints-list">' +
        complaints.map(c => `
          <div class="complaint-item" id="item-${c._id}">
            <div class="complaint-info">
              <div class="complaint-top">
                <div class="complaint-title">${c.issueTitle}</div>
                <div class="complaint-student">👤 ${c.studentName}</div>
              </div>
              <div class="complaint-desc">${c.description}</div>
              <div class="complaint-date">📅 ${new Date(c.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
              ${c.studentConfirmed ? '<div style="margin-top:6px;font-size:12px;font-weight:600;color:#16a34a;">✔️ Student verified this</div>' : ''}
            </div>
            <div class="complaint-actions">
              <div class="badge ${getBadgeClass(c.status)}" id="badge-${c._id}">${c.status}</div>
              <select class="status-select" id="select-${c._id}" ${c.status === 'Verified' ? 'disabled' : ''}>
                <option value="Pending"     ${c.status === 'Pending'     ? 'selected' : ''}>⏳Pending</option>
                <option value="Resolved"    ${c.status === 'Resolved'   ? 'selected' : ''}>🔧Resolved</option>
                <option value="Verified" ${c.status === 'Verified' ? 'selected' : ''} disabled>✅ Verified</option>
              </select>
              <button class="btn-update" onclick="updateStatus('${c._id}')" ${c.status === 'Verified' ? 'disabled' : ''}>
                ${c.status === 'Verified' ? '🔒Verified' : 'Update'}
              </button>  
              </div>          
          </div>
        `).join('') +
      '</div>';
    }

    async function updateStatus(id) {
      const select = document.getElementById(`select-${id}`);
      const newStatus = select.value;
      const btn = select.nextElementSibling;

      btn.disabled = true;
      btn.textContent = '...';

      try {
        const response = await fetch(`http://localhost:5000/api/complaints/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status: newStatus })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.message || 'Update failed');

        const badge = document.getElementById(`badge-${id}`);
        badge.textContent = newStatus;
        badge.className = `badge ${getBadgeClass(newStatus)}`;

        const idx = allComplaints.findIndex(c => c._id === id);
        if (idx !== -1) allComplaints[idx].status = newStatus;
        updateStats(allComplaints);

        showToast('Status updated successfully!', 'success');

      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update';
      }
    }

    function updateStats(complaints) {
      document.getElementById('countTotal').textContent = complaints.length;
      document.getElementById('countPending').textContent =
        complaints.filter(c => c.status === 'Pending').length;
      document.getElementById('countResolved').textContent =
        complaints.filter(c => c.status === 'Resolved').length;
      document.getElementById('countVerified').textContent =
        complaints.filter(c => c.status === 'Verified').length;
    }

    function getBadgeClass(status) {
      if (status === 'Pending') return 'badge-pending';
      if (status === 'Resolved') return 'badge-resolved';
      if (status === 'Verified') return 'badge-verified';
      return 'badge-pending';
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      localStorage.removeItem('hostelId');
      window.location.href = 'login.html';
    }

    // Load on page open
    loadComplaints();
  </script>
</body>
</html>
