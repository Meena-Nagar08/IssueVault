<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IssueVault — Student Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --white: #ffffff;
      --accent: #4361ee;
      --accent2: #7209b7;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e2e8f0;
      --font: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      min-height: 100vh;
      color: var(--text);
    }

    .navbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(67,97,238,0.07);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-user {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    .nav-user span {
      color: var(--accent);
      font-weight: 700;
    }

    .btn-logout {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: #fee2e2; }

    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 20px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 20px 22px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(67,97,238,0.06);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .stat-value.pending  { color: var(--warning); }
    .stat-value.resolved { color: var(--accent); }
    .stat-value.verified { color: var(--success); }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(67,97,238,0.06);
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      resize: vertical;
    }

    input::placeholder, textarea::placeholder { color: #b0b8cc; }

    input:focus, textarea:focus {
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.12);
    }

    .btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      padding: 12px 24px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(67,97,238,0.3);
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-loader {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 11px 15px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }

    .complaints-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .complaint-item {
      background: white;
      border-radius: 14px;
      padding: 20px 22px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(67,97,238,0.05);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .complaint-info { flex: 1; }

    .complaint-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .complaint-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .complaint-date {
      font-size: 12px;
      color: #b0b8cc;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-pending  { background: #fef3c7; color: #d97706; }
    .badge-resolved { background: #eff6ff; color: #2563eb; }
    .badge-verified { background: #f0fdf4; color: #16a34a; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      .navbar { padding: 0 16px; }
      .main { padding: 24px 16px; }
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn:hover { color: #0d9488; }
    .tab-btn.active {
      color: #0d9488;
      border-bottom-color: #0d9488;
    }

    .badge-verified { background: #f3e8ff; color: #7c3aed; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <div class="brand-icon">🏠</div>
      <div class="brand-name">IssueVault</div>
    </div>
    <div class="nav-right">
      <div class="nav-user">Logged in as <span id="navHostelId">...</span></div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="main">

    <div class="page-header">
      <h1>My Complaints 📋</h1>
      <p>Submit a new complaint or track existing ones.</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">⏳Pending</div>
        <div class="stat-value pending" id="countPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🔧Resolved</div>
        <div class="stat-value resolved" id="countResolved">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">✅Verified</div>
        <div class="stat-value verified" id="countVerified">0</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Submit New Complaint..</div>

      <div class="alert alert-error" id="formError"></div>
      <div class="alert alert-success" id="formSuccess"></div>

      <div class="form-group">
        <label>Issue Title</label>
        <input type="text" id="issueTitle" placeholder="e.g. Fan not working in room 204"/>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description" rows="3" placeholder="Describe the issue in detail..."></textarea>
      </div>

      <button class="btn" id="submitBtn" onclick="submitComplaint()">
        <span id="submitBtnText">Submit Complaint</span>
        <div class="btn-loader" id="submitLoader"></div>
      </button>
    </div>

    <div class="card">
  <div class="card-title">📌 Complaint History</div>
  
  <div style="display:flex; gap:8px; margin-bottom:20px; border-bottom:2px solid #e5ddd4; padding-bottom:0;">
    <button class="tab-btn active" id="tab-all" onclick="switchTab('All')">All</button>
    <button class="tab-btn" id="tab-pending" onclick="switchTab('Pending')">⏳Pending</button>
    <button class="tab-btn" id="tab-resolved" onclick="switchTab('Resolved')">🔧Resolved</button>
    <button class="tab-btn" id="tab-verified" onclick="switchTab('Verified')">✅Verified</button>
  </div>

  <div id="complaintsList"><div class="loading">Loading your complaints...</div></div>
</div>

  </div>

  <script>
    // When page loads, check if user is logged in
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const hostelId = localStorage.getItem('hostelId');

    // If not logged in or is admin - redirect
    if (!token || role !== 'student') {
      window.location.href = 'login.html';
    }

    // Show hostel ID in navbar
    document.getElementById('navHostelId').textContent = hostelId || 'Student';

    let currentTab = 'All';
    let allComplaints = [];

    function switchTab(status) {
    console.log('allComplaints:', allComplaints);
    console.log('status:', status);
    currentTab = status;

    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tabMap = { 'All': 'tab-all', 'Pending': 'tab-pending', 'Resolved': 'tab-resolved', 'Verified': 'tab-verified' };
    document.getElementById(tabMap[status]).classList.add('active');

    if (status === 'All') {
      renderComplaints(allComplaints);
    } else {
      renderComplaints(allComplaints.filter(c => c.status === status));
    }
  }

  // fetches all complaints from backend
    async function loadComplaints() {
      try {
        const response = await fetch('http://localhost:5000/api/complaints', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          }
        });

        const data = await response.json();

        if (!response.ok) {
          if (response.status === 401) {
            logout(); 
            return;
          }
          throw new Error('Failed to load complaints');
        }

        allComplaints = data;
        renderComplaints(data);
        updateStats(data);

      } catch (error) {
        document.getElementById('complaintsList').innerHTML =
          '<div class="empty-state"><div class="emoji">⚠️</div><p>Failed to load complaints.</p></div>';
      }
    }

    function renderComplaints(complaints) {
      const list = document.getElementById('complaintsList');

      if (complaints.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>No complaints yet. Submit one above!</p></div>';
        return;
      }

      list.innerHTML = '<div class="complaints-list">' +
        complaints.map(c => `
          <div class="complaint-item">
            <div class="complaint-info">
              <div class="complaint-title">${c.issueTitle}</div>
              <div class="complaint-desc">${c.description}</div>
              <div class="complaint-date">${new Date(c.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
              ${c.status === 'Resolved' ? `
              <button onclick="verifyComplaint('${c._id}')" style="margin-top:10px;background:#7c3aed;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">
                  ✔️ Mark as Verified
               </button>` : ''}
               ${c.status === 'Verified' ? `
     <div style="margin-top:8px;font-size:12px;color:#7c3aed;font-weight:600;">✔️ You verified this complaint</div>` : ''}
              </div>
            <div class="badge ${getBadgeClass(c.status)}">${c.status}</div>
          </div>
        `).join('') +
      '</div>';
    }

    function updateStats(complaints) {
      document.getElementById('countPending').textContent =
        complaints.filter(c => c.status === 'Pending').length;
      document.getElementById('countResolved').textContent =
        complaints.filter(c => c.status === 'Resolved').length;
      document.getElementById('countVerified').textContent =
        complaints.filter(c => c.status === 'Verified').length;
    }

      async function verifyComplaint(id) {
    try {
      const response = await fetch(`http://localhost:5000/api/complaints/${id}/confirm`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.message);
      loadComplaints();
    } catch (error) {
      alert('Error: ' + error.message);
    }
  }

    function getBadgeClass(status) {
      if (status === 'Pending') return 'badge-pending';
      if (status === 'Resolved') return 'badge-resolved';
      if (status === 'Verified') return 'badge-verified';
      return 'badge-pending';
    }

    async function submitComplaint() {
      const issueTitle = document.getElementById('issueTitle').value.trim();
      const description = document.getElementById('description').value.trim();
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('submitBtnText');
      const loader = document.getElementById('submitLoader');
      const formError = document.getElementById('formError');
      const formSuccess = document.getElementById('formSuccess');

      formError.style.display = 'none';
      formSuccess.style.display = 'none';

      // Validate
      if (!issueTitle || !description) {
        formError.textContent = 'Please fill in all fields.';
        formError.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btnText.style.display = 'none';
      loader.style.display = 'block';

      try {
        const response = await fetch('http://localhost:5000/api/complaints', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({
            studentName: hostelId,
            issueTitle,
            description
          })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.message || 'Failed to submit');

        formSuccess.textContent = 'Complaint submitted successfully!';
        formSuccess.style.display = 'block';

        // Clear form
        document.getElementById('issueTitle').value = '';
        document.getElementById('description').value = '';

        // Reload complaints list
        loadComplaints();

      } catch (error) {
        formError.textContent = error.message;
        formError.style.display = 'block';
      } finally {
        btn.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    }

    // ─── LOGOUT ───
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      localStorage.removeItem('hostelId');
      window.location.href = 'login.html';
    }

    // Load complaints when page opens
    loadComplaints();
  </script>
</body>
</html>
